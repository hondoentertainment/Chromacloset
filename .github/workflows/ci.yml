name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
